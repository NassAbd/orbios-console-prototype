<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Panel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: monospace;
  overflow: hidden;
}

.panel {
  background: #3a3d42;
  border: 2px solid #2a2c30;
  border-top-color: #50545a;
  border-left-color: #50545a;
  border-radius: 6px;
  padding: 14px;
  flex-shrink: 0;
}

.panel-title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #555;
}

.panel-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  color: #8a9aaa;
  font-weight: 500;
  text-transform: uppercase;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4caf50;
  transition: background 0.3s;
}
.status-dot.busy  { background: #ffaa33; }
.status-dot.error { background: #ff4444; }

/* ── Text display ────────────────────────────────────── */
.display-bezel {
  background: #0d0f0d;
  border-top:    1px solid #1a1c1a;
  border-left:   1px solid #1a1c1a;
  border-bottom: 1px solid #333;
  border-right:  1px solid #333;
  border-radius: 3px;
  padding: 6px 7px;
  margin-bottom: 10px;
}

.display-screen {
  font-family: monospace;
  font-size: 13px;
  line-height: 1.25;
  color: #7fff82;
  white-space: pre;
  overflow: hidden;
  display: block;
  width: 40ch;
}

.display-divider {
  border: none;
  border-top: 1px solid #555;
  margin: 0 0 10px 0;
}

/* ── Buttons ─────────────────────────────────────────── */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

.btn {
  background: #2e3035;
  border-top:    1px solid #606368;
  border-left:   1px solid #606368;
  border-bottom: 2px solid #18191c;
  border-right:  2px solid #18191c;
  border-radius: 3px;
  padding: 5px 4px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 52px;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

.btn:active:not(.disabled) {
  border-top:    2px solid #18191c;
  border-left:   2px solid #18191c;
  border-bottom: 1px solid #606368;
  border-right:  1px solid #606368;
  background: #282a2f;
}

.btn.latched {
  background: #2c2614;
  border-top-color:    #7a6020;
  border-left-color:   #7a6020;
  border-bottom-color: #181200;
  border-right-color:  #181200;
}

.btn.special {
  background: #1c2535;
  border-top-color:    #3a5478;
  border-left-color:   #3a5478;
  border-bottom-color: #0a1020;
  border-right-color:  #0a1020;
}

.btn.disabled { opacity: 0.25; cursor: default; }
.btn.flash    { filter: brightness(1.6); }

.btn-num {
  position: absolute; top: 2px; left: 3px;
  font-size: 7px; color: #4a5060;
  font-family: monospace; line-height: 1;
}

.btn-text {
  display: flex; flex-direction: column; align-items: center;
}

.btn-line {
  font-family: monospace;
  line-height: 1.45;
  letter-spacing: 0.02em;
  text-align: center;
  white-space: pre;
  display: block;
}

.col-green { color: #7fff82; }
.col-amber { color: #ffaa33; }
.col-blue  { color: #88bbff; }

.me-flag {
  position: absolute; bottom: 2px; right: 3px;
  font-family: monospace; font-size: 7.5px;
  color: #ffaa33; line-height: 1; pointer-events: none;
}

.status-bar {
  margin-top: 10px;
  padding-top: 6px;
  border-top: 1px solid #484c50;
  font-size: 8px; font-family: monospace;
  letter-spacing: 0.06em; height: 14px;
  color: #667788; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
</style>
</head>
<body>

<div class="panel" id="panel">
  <div class="panel-title-bar">
    <span class="panel-label" id="panel-title">CTRL · PANEL</span>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <!-- TEXT DISPLAY -->
  <div class="display-bezel" id="display-bezel">
    <span class="display-screen" id="display-screen"></span>
  </div>
  <hr class="display-divider" id="display-divider">

  <!-- BUTTONS -->
  <div class="btn-grid" id="btn-grid"></div>
  <div class="status-bar" id="status-bar">INITIALISING</div>
</div>

<input type="file" id="file-picker" accept=".json,application/json" style="display:none">

<script>
const API      = 'http://localhost:8765/api';
const ROWS     = 20;
const COLS     = 40;

// ─── DEFAULT CONFIG ───────────────────────────────────────────────────────────
const DEFAULT_CONFIG = {
  "panel": { "title": "ORBIOS MISSION CTRL v2.1", "font_size": 10, "width_px": 360 },
  "display": { "dir": "signals/logs", "poll_interval_ms": 1000, "substitutions": { "_": " " } },
  "buttons": [
    { "id": 1,  "note": "reserved — RESET" },
    { "id": 2,  "note": "reserved — RELOAD" },
    { "id": 3,  "type": "instantaneous", "label": ["TRIGGER ", "FIRE    "], "file": { "dir": "signals/mission", "name": "INIT_FIRE" } },
    { "id": 4,  "type": "instantaneous", "label": ["RUN AI  ", "ENGINE  "], "file": { "dir": "signals/mission", "name": "START_AI" } },
    { "id": 5,  "type": "latched",       "label": ["AOS     ", "GS-01   "], "file": { "dir": "signals/mission", "name": "AOS_GS01.dat" } },
    { "id": 6,  "type": "instantaneous", "label": ["PURGE   ", "SIGNALS "], "file": { "dir": "signals/mission", "name": "RESET" } },
    { "id": 7,  "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 8,  "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 9,  "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 10, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 11, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 12, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 13, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 14, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 15, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } },
    { "id": 16, "type": "instantaneous", "label": ["        ", "        "], "file": { "dir": "signals/mission", "name": "" } }
  ]
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let config       = null;
let latchState   = {};
let latchedFilename = {}; // Store filenames of latched buttons to clean them up on release
let touchedFiles = {};
let displayLines = [];   // rolling buffer of all lines ever added this session
let seenFiles    = new Set();
let pollTimer    = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const btnCfg = id => config.buttons.find(b => b.id === id) || null;
const pad8   = s  => (s || '        ').substring(0, 8).padEnd(8, ' ');

function setStatus(msg, level) {
  document.getElementById('status-bar').textContent = msg.toUpperCase();
  document.getElementById('status-dot').className = 'status-dot' + (level ? ' ' + level : '');
}

function flash(id) {
  const el = document.getElementById('btn-' + id);
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 130);
}

function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')   + ':'
       + String(d.getMinutes()).padStart(2,'0') + ':'
       + String(d.getSeconds()).padStart(2,'0');
}

function versionedName(name) {
  const now = new Date();
  const ts  = now.getFullYear()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0')
    + '_'
    + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0')
    + String(now.getSeconds()).padStart(2,'0');
  const dot = name.lastIndexOf('.');
  return dot === -1 ? name + '_' + ts : name.substring(0, dot) + '_' + ts + name.substring(dot);
}

// ─── FILE OPS ────────────────────────────────────────────────────────────────
async function apiCall(endpoint, payload) {
  try {
    const r = await fetch(API + '/' + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return await r.json();
  } catch (e) {
    setStatus('SERVER ERROR: ' + e.message, 'error');
    return { error: e.message };
  }
}

async function touchFile(dir, name) {
  if (!dir || !name) return true;
  const res = await apiCall('touch', { dir, name });
  if (res.error) { setStatus('TOUCH FAILED: ' + res.error, 'error'); return false; }
  touchedFiles[dir + '||' + name] = { dir, name };
  return true;
}

async function removeFile(dir, name) {
  if (!dir || !name) return;
  await apiCall('remove', { dir, name });
  delete touchedFiles[dir + '||' + name];
}

// ─── DISPLAY ─────────────────────────────────────────────────────────────────
function applySubstitutions(filename) {
  const dot  = filename.lastIndexOf('.');
  let name   = dot === -1 ? filename : filename.substring(0, dot);
  const subs = config.display && config.display.substitutions;
  if (subs) {
    for (const [token, replacement] of Object.entries(subs)) {
      name = name.split(token).join(replacement);
    }
  }
  return name;
}

function displayAppend(line) {
  // Truncate to COLS chars
  const truncated = line.length > COLS ? line.substring(0, COLS) : line;
  displayLines.push(truncated);
  renderDisplay();
}

function renderDisplay() {
  const el = document.getElementById('display-screen');
  if (!el) return;
  // Show last ROWS lines, each padded to COLS
  const visible = displayLines.slice(-ROWS);
  while (visible.length < ROWS) visible.unshift('');
  el.textContent = visible.map(l => l.padEnd(COLS, ' ')).join('\n');
}

function clearDisplay() {
  displayLines = [];
  renderDisplay();
}

function initDisplay() {
  renderDisplay();
}

// ─── POLLING ─────────────────────────────────────────────────────────────────
async function pollDir() {
  if (!config.display || !config.display.dir) return;
  const res = await apiCall('listdir', { dir: config.display.dir });
  if (res.error) return;

  const newFiles = (res.files || []).filter(f => !seenFiles.has(f));
  newFiles.sort(); // stable order if multiple arrive together

  for (const filename of newFiles) {
    seenFiles.add(filename);
    const processed = applySubstitutions(filename);
    const line      = nowTime() + '  ' + processed;
    displayAppend(line);
  }
}

function startPolling() {
  stopPolling();
  if (!config.display || !config.display.dir) return;
  const interval = config.display.poll_interval_ms || 5000;
  pollTimer = setInterval(pollDir, interval);
  pollDir(); // immediate first poll
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function buildButton(id) {
  const cfg      = btnCfg(id);
  const fontSize = config.panel.font_size || 9.5;

  const div = document.createElement('div');
  div.className = 'btn';
  div.id = 'btn-' + id;

  const numEl = document.createElement('span');
  numEl.className = 'btn-num';
  numEl.textContent = id;
  div.appendChild(numEl);

  const wrap = document.createElement('div');
  wrap.className = 'btn-text';
  wrap.id = 'btn-text-' + id;

  const makeSpan = (text, col) => {
    const s = document.createElement('span');
    s.className = 'btn-line col-' + col;
    s.style.fontSize = fontSize + 'px';
    s.textContent = pad8(text);
    return s;
  };

  if (id === 1) {
    div.classList.add('special');
    wrap.appendChild(makeSpan(' RESET  ', 'blue'));
    wrap.appendChild(makeSpan('        ', 'blue'));
    div.addEventListener('click', handleReset);
  } else if (id === 2) {
    div.classList.add('special');
    wrap.appendChild(makeSpan(' RELOAD ', 'blue'));
    wrap.appendChild(makeSpan('        ', 'blue'));
    div.addEventListener('click', handleReload);
  } else if (!cfg || !cfg.type) {
    div.classList.add('disabled');
    wrap.appendChild(makeSpan('        ', 'green'));
    wrap.appendChild(makeSpan('        ', 'green'));
  } else {
    const label = cfg.label || ['        ', '        '];
    wrap.appendChild(makeSpan(label[0], 'green'));
    wrap.appendChild(makeSpan(label[1], 'green'));
    const meEl = document.createElement('span');
    meEl.className = 'me-flag';
    meEl.id = 'me-' + id;
    div.appendChild(meEl);
    div.addEventListener('click', () => handleButtonClick(id));
  }

  div.appendChild(wrap);
  return div;
}

function renderButtons() {
  const grid = document.getElementById('btn-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 16; i++) grid.appendChild(buildButton(i));
}

function updateButtonVisual(id) {
  const cfg = btnCfg(id);
  if (!cfg || id <= 2) return;
  const div      = document.getElementById('btn-' + id);
  const wrap     = document.getElementById('btn-text-' + id);
  const lines    = wrap ? wrap.querySelectorAll('.btn-line') : [];
  const fontSize = config.panel.font_size || 9.5;
  const latched  = latchState[id] || false;
  div.classList.toggle('latched', latched);
  const label = (latched && cfg.latch_label) ? cfg.latch_label : (cfg.label || ['        ', '        ']);
  const col   = latched ? 'amber' : 'green';
  lines.forEach((line, i) => {
    line.className      = 'btn-line col-' + col;
    line.style.fontSize = fontSize + 'px';
    line.textContent    = pad8(label[i]);
  });
}

function updateAllMEFlags() {
  document.querySelectorAll('.me-flag').forEach(el => el.textContent = '');
  config.buttons.forEach(btn => {
    if (btn.id <= 2 || !btn.me || !latchState[btn.id]) return;
    btn.me.forEach(pid => {
      const el = document.getElementById('me-' + pid);
      if (el) el.textContent = '#' + btn.id;
    });
  });
}

// ─── BUTTON HANDLERS ─────────────────────────────────────────────────────────
async function handleButtonClick(id) {
  const cfg = btnCfg(id);
  if (!cfg || !cfg.type) return;
  flash(id);

  if (cfg.type === 'instantaneous') {
    if (cfg.file && cfg.file.dir && cfg.file.name) {
      const vname = versionedName(cfg.file.name);
      const ok    = await touchFile(cfg.file.dir, vname);
      if (ok) setStatus('TOUCHED: ' + vname);
    }
  } else if (cfg.type === 'latched') {
    latchState[id] = !(latchState[id] || false);
    if (latchState[id]) {
      if (cfg.me) {
        for (const pid of cfg.me) {
          if (latchState[pid]) {
            latchState[pid] = false;
            if (latchedFilename[pid]) {
              await removeFile(cfg.file.dir, latchedFilename[pid]);
              delete latchedFilename[pid];
            }
            updateButtonVisual(pid);
          }
        }
      }
      if (cfg.file && cfg.file.dir && cfg.file.name) {
        const vname = versionedName(cfg.file.name);
        latchedFilename[id] = vname;
        const ok    = await touchFile(cfg.file.dir, vname);
        if (ok) setStatus('LATCHED: ' + vname);
      } else {
        setStatus('LATCHED: BTN ' + id);
      }
    } else {
      if (cfg.file && cfg.file.dir && cfg.file.name && latchedFilename[id]) {
        await removeFile(cfg.file.dir, latchedFilename[id]);
        setStatus('RELEASED: ' + latchedFilename[id]);
        delete latchedFilename[id];
      } else {
        setStatus('RELEASED: BTN ' + id);
      }
    }
    updateButtonVisual(id);
    updateAllMEFlags();
  }
}

async function handleReset() {
  flash(1);
  setStatus('RESETTING...', 'busy');
  // Remove written files only
  for (const { dir, name } of Object.values(touchedFiles))
    await removeFile(dir, name);
  touchedFiles = {};
  latchState   = {};
  // Clear display and reset seen-file tracking
  clearDisplay();
  seenFiles = new Set();
  renderButtons();
  setStatus('RESET — FILES CLEARED, DISPLAY CLEARED');
}

function validateConfig(cfg) {
  const errs = [];

  if (!cfg.panel)
    errs.push('missing "panel" block');

  if (!cfg.buttons)
    errs.push('missing "buttons" array at root level (check closing } on display block)');
  else if (!Array.isArray(cfg.buttons))
    errs.push('"buttons" must be an array');
  else {
    // Check every id 1-16 is present
    const ids = cfg.buttons.map(b => b.id);
    for (let i = 1; i <= 16; i++)
      if (!ids.includes(i)) errs.push('button id ' + i + ' is missing');

    // Check required fields on non-reserved buttons
    cfg.buttons.forEach(b => {
      if (b.id <= 2) return;
      if (!b.type)
        errs.push('btn ' + b.id + ': missing "type"');
      else if (b.type.trim() !== b.type)
        errs.push('btn ' + b.id + ': "type" has leading/trailing spaces — use "' + b.type.trim() + '"');
      else if (!['latched','instantaneous'].includes(b.type))
        errs.push('btn ' + b.id + ': unknown type "' + b.type + '"');
      if (!b.label || !Array.isArray(b.label) || b.label.length < 2)
        errs.push('btn ' + b.id + ': "label" must be a 2-element array');
      if (b.type === 'latched' && b.latch_label &&
          (!Array.isArray(b.latch_label) || b.latch_label.length < 2))
        errs.push('btn ' + b.id + ': "latch_label" must be a 2-element array');
      if (!b.file || typeof b.file.dir === 'undefined' || typeof b.file.name === 'undefined')
        errs.push('btn ' + b.id + ': "file" must have "dir" and "name" fields');
    });
  }

  if (cfg.display) {
    if (!cfg.display.dir)
      errs.push('display: missing "dir"');
    if (cfg.display.poll_interval_ms && cfg.display.poll_interval_ms < 500)
      errs.push('display: poll_interval_ms is very low (min recommended: 500)');
    if (cfg.display.buttons)
      errs.push('display: "buttons" found inside display block — should be at root level');
  }

  return errs;
}

function handleReload() {
  flash(2);
  const picker = document.getElementById('file-picker');
  picker.onchange = async () => {
    const file = picker.files[0];
    if (!file) return;
    try {
      const text   = await file.text();
      let newCfg;
      try {
        newCfg = JSON.parse(text);
      } catch (e) {
        setStatus('JSON SYNTAX ERROR: ' + e.message, 'error');
        console.error('JSON parse error:', e.message);
        picker.value = '';
        return;
      }

      const errs = validateConfig(newCfg);
      if (errs.length > 0) {
        setStatus('CONFIG ERROR: ' + errs[0], 'error');
        console.error('Config validation errors:\n' + errs.map((e,i) => (i+1) + '. ' + e).join('\n'));
        picker.value = '';
        return;
      }

      await boot(newCfg, false);
      setStatus('RELOADED: ' + file.name);
    } catch (e) {
      setStatus('RELOAD ERROR: ' + e.message, 'error');
    }
    picker.value = '';
  };
  picker.click();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot(cfg, resetState = true) {
  config = cfg;
  if (resetState) { latchState = {}; touchedFiles = {}; displayLines = []; seenFiles = new Set(); }

  document.getElementById('panel').style.width =
    (config.panel.width_px || 360) + 'px';
  document.getElementById('panel-title').textContent =
    config.panel.title || 'CTRL PANEL';

  initDisplay();
  renderButtons();
  startPolling();
  setStatus('READY');
}

boot(DEFAULT_CONFIG);
</script>
</body>
</html>
