<!DOCTYPE html>
<html>
<head>
    <title>ORBIOS — TACTICAL GEOSPATIAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; margin: 0; background: #000; overflow: hidden; }
        #map { 
            /* Invert filter removed to keep map colorful */
        }
        .leaflet-container { background: #000 !important; }

        /* Animated downlink beam style */
        @keyframes dash {
            to {
                stroke-dashoffset: -20;
            }
        }
        .downlink-polyline {
            stroke-dasharray: 6, 6;
            animation: dash 1.5s linear infinite;
        }
        .overlay-label {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            color: #00ff41; font-family: monospace; font-size: 10px;
            background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid #00ff41;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }

        /* Leaflet Popup Styling Override for Phosphor Aesthetic */
        .leaflet-popup-content-wrapper {
            background: #000 !important;
            color: #00ff41 !important;
            border: 1.5px solid #00ff41 !important;
            font-family: monospace !important;
            font-size: 10px !important;
            border-radius: 4px !important;
            box-shadow: 0 0 15px rgba(0,255,65,0.4) !important;
        }
        .leaflet-popup-tip {
            background: #000 !important;
            border-left: 1.5px solid #00ff41 !important;
            border-bottom: 1.5px solid #00ff41 !important;
        }

        /* Custom Satellite Marker Icon Styling */
        .sat-marker-element {
            color: #e24b4a;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 8px rgba(226,75,74,0.8);
            transform: rotate(45deg);
        }

        /* HUD Map Legend Key */
        .map-legend {
            position: absolute; bottom: 20px; right: 10px; z-index: 1000;
            color: #fff; font-family: monospace; font-size: 9px;
            background: rgba(0,0,0,0.85); padding: 10px 14px; border: 1.5px solid #00ff41;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,255,65,0.2);
            line-height: 1.6;
            min-width: 200px;
        }
        .legend-title {
            color: #00ff41;
            font-weight: bold;
            font-size: 10px;
            margin-bottom: 6px;
            text-transform: uppercase;
            border-bottom: 0.5px solid rgba(0,255,65,0.3);
            padding-bottom: 3px;
            letter-spacing: 1px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .legend-icon {
            width: 14px;
            height: 14px;
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            border-radius: 2px;
        }
        .legend-circle-swir { border: 1.5px solid #ffaa33; background: rgba(255,170,51,0.2); }
        .legend-circle-vnir { border: 1.5px solid #00ff41; background: rgba(0,255,65,0.1); }
        .legend-circle-thermal { border: 1.5px solid #e24b4a; background: rgba(226,75,74,0.05); }
        .legend-line-targeting { height: 2px; background: repeating-linear-gradient(90deg, #ffaa33, #ffaa33 4px, transparent 4px, transparent 8px); width: 14px; }
        .legend-line-confirmed { height: 2px; background: #e24b4a; width: 14px; }
        .legend-line-oilleak { height: 2px; background: #6ab0e8; width: 14px; }

        /* Unconfirmed Anomaly Animation (Amber Pulsing) */
        @keyframes amber-pulse {
            0% { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 0 0px rgba(255, 170, 51, 0.7); }
            70% { transform: scale(1.2); opacity: 0.4; box-shadow: 0 0 0 15px rgba(255, 170, 51, 0); }
            100% { transform: scale(0.6); opacity: 0; box-shadow: 0 0 0 0px rgba(255, 170, 51, 0); }
        }
        .fire-unconfirmed-pulse {
            background: #ffaa33;
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: amber-pulse 1.2s infinite ease-out;
            border: 2px solid #fff;
        }

        /* Confirmed Wildfire Animation (Neon Critical Red Pulsing) */
        @keyframes red-pulse {
            0% { transform: scale(0.8); opacity: 1; box-shadow: 0 0 0 0px rgba(226, 75, 74, 0.8); }
            70% { transform: scale(1.6); opacity: 0.3; box-shadow: 0 0 0 25px rgba(226, 75, 74, 0); }
            100% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 0px rgba(226, 75, 74, 0); }
        }
        .fire-confirmed-pulse {
            background: #e24b4a;
            border-radius: 50%;
            width: 22px; height: 22px;
            animation: red-pulse 0.9s infinite ease-out;
            border: 2.5px solid #fff;
            box-shadow: 0 0 15px rgba(226,75,74,0.6);
        }

        /* Confirmed Oil Leak Animation (Neon Blue Pulsing) */
        @keyframes blue-pulse {
            0% { transform: scale(0.8); opacity: 1; box-shadow: 0 0 0 0px rgba(106, 176, 232, 0.8); }
            70% { transform: scale(1.6); opacity: 0.3; box-shadow: 0 0 0 25px rgba(106, 176, 232, 0); }
            100% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 0px rgba(106, 176, 232, 0); }
        }
        .oil-leak-pulse {
            background: #6ab0e8;
            border-radius: 50%;
            width: 22px; height: 22px;
            animation: blue-pulse 0.9s infinite ease-out;
            border: 2.5px solid #fff;
            box-shadow: 0 0 15px rgba(106,176,232,0.6);
        }
    </style>
</head>
<body>
    <div class="overlay-label">TACTICAL GEOSPATIAL VIEW // SAT-TRACKING ACTIVE</div>
    
    <div class="map-legend">
        <div class="legend-title">Tactical Map Key</div>
        <div class="legend-item">
            <span class="legend-icon" style="color:#e24b4a; font-size:12px;">▲</span>
            <span>Satellite (ORBIOS-S1)</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon legend-circle-swir"></span>
            <span>SWIR Sensor (300km footprint)</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon legend-circle-vnir"></span>
            <span>VNIR Sensor (600km footprint)</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon legend-circle-thermal"></span>
            <span>Thermal Sensor (700km footprint)</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon legend-line-targeting"></span>
            <span>Targeting Beam (AI Processing)</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon legend-line-confirmed"></span>
            <span>Wildfire Alert Downlink</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon legend-line-oilleak"></span>
            <span>Oil Leak Alert Downlink</span>
        </div>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { 
            center: [40.2, -6.5], zoom: 6, 
            zoomControl: false, attributionControl: false 
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let satMarker = null;
        let swirCircle = null;
        let vnirCircle = null;
        let thermalCircle = null;
        let missionMarkers = {};

        // Custom Satellite Icon (using divIcon for glow filter compatibility)
        const satIcon = L.divIcon({
            html: '<div class="sat-marker-element">▲</div>',
            className: 'sat-icon-wrapper',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        async function pollTelemetry() {
            try {
                const r = await fetch('http://localhost:5005/data/telemetry/sat_01.json?t=' + Date.now());
                if (r.ok) {
                    const data = await r.json();
                    
                    if (!satMarker) {
                        // Create satellite marker and footprint circles
                        satMarker = L.marker([data.lat, data.lon], {icon: satIcon}).addTo(map);
                        
                        swirCircle = L.circle([data.lat, data.lon], {
                            radius: 150000, // 300km diameter SWIR sensor footprint
                            color: '#ffaa33',
                            fillColor: '#ffaa33',
                            fillOpacity: 0.15,
                            weight: 1.5
                        }).addTo(map);
                        
                        vnirCircle = L.circle([data.lat, data.lon], {
                            radius: 300000, // 600km diameter VNIR sensor footprint
                            color: '#00ff41',
                            fillColor: '#00ff41',
                            fillOpacity: 0.1,
                            weight: 1.5
                        }).addTo(map);
                        
                        thermalCircle = L.circle([data.lat, data.lon], {
                            radius: 350000, // 700km diameter Thermal sensor footprint
                            color: '#e24b4a',
                            fillColor: '#e24b4a',
                            fillOpacity: 0.05,
                            weight: 1.5
                        }).addTo(map);
                    } else {
                        // Smoothly update positions
                        satMarker.setLatLng([data.lat, data.lon]);
                        swirCircle.setLatLng([data.lat, data.lon]);
                        vnirCircle.setLatLng([data.lat, data.lon]);
                        thermalCircle.setLatLng([data.lat, data.lon]);
                    }
                }
            } catch(e) {
                console.error("Telemetry Error:", e);
            }
        }

        let downlinkLine = null;
        let targetArrow = null;

        function updateDownlinkArrow(startLatLng, endLatLng, color, isDashed) {
            if (downlinkLine) {
                downlinkLine.remove();
            }
            if (targetArrow) {
                targetArrow.remove();
            }
            
            downlinkLine = L.polyline([startLatLng, endLatLng], {
                color: color,
                weight: 3,
                opacity: 0.85,
                className: isDashed ? 'downlink-polyline' : ''
            }).addTo(map);
            
            // Calculate angle for arrowhead pointing to target
            const dy = endLatLng[0] - startLatLng[0];
            const dx = endLatLng[1] - startLatLng[1];
            let angle = Math.atan2(dy, dx) * 180 / Math.PI;
            
            const arrowIcon = L.divIcon({
                html: `<div style="transform: rotate(${angle + 90}deg); color: ${color}; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px ${color}; text-align: center;">▲</div>`,
                className: 'arrowhead-marker',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            
            targetArrow = L.marker(endLatLng, { icon: arrowIcon }).addTo(map);
        }

        function clearDownlinkArrow() {
            if (downlinkLine) {
                downlinkLine.remove();
                downlinkLine = null;
            }
            if (targetArrow) {
                targetArrow.remove();
                targetArrow = null;
            }
        }

        async function pollMission() {
            try {
                const files = [
                    { name: 'FIRE_CONFIRMED.json', color: '#e24b4a', type: 'confirmed' },
                    { name: 'OIL_LEAK_ACTIVE.json', color: '#6ab0e8', type: 'oilleak' },
                    { name: 'HEAT_SPIKE_ACTIVE.json', color: '#ffaa33', type: 'unconfirmed' }
                ];
                
                let activeTarget = null;
                let activeColor = '#00ff41';
                let isDashed = true;
                let activeAlertFound = false;
                
                for (const item of files) {
                    const r = await fetch('http://localhost:5005/signals/mission/' + item.name + '?t=' + Date.now());
                    if (r.ok) {
                        const data = await r.json();
                        activeAlertFound = true;
                        activeTarget = [data.lat, data.lon];
                        activeColor = item.color;
                        isDashed = false;
                        
                        if (!missionMarkers[item.name]) {
                            // Formulate detailed tactical telemetry popups
                            let popupText = '';
                            if (item.type === 'confirmed') {
                                popupText = `
                                    <div style="line-height: 1.4;">
                                        <b style="color: #e24b4a; font-size: 11px;">🚨 CRITICAL WILDFIRE CONFIRMED</b><br>
                                        <hr style="border: none; border-top: 1px solid #e24b4a; margin: 4px 0;">
                                        <b>COORDS:</b> [${data.lat.toFixed(4)}N, ${data.lon.toFixed(4)}E]<br>
                                        <b>INTENSITY:</b> ${(data.intensity * 100).toFixed(1)}%<br>
                                        <b>AI EDGE RUNNER:</b> EDGE_INFERENCE_VALIDATED<br>
                                        <b>GS-LINK:</b> ESTABLISHED
                                    </div>
                                `;
                            } else if (item.type === 'unconfirmed') {
                                popupText = `
                                    <div style="line-height: 1.4;">
                                        <b style="color: #ffaa33; font-size: 11px;">⚠️ RAW HEAT SIGNATURE DETECTED</b><br>
                                        <hr style="border: none; border-top: 1px solid #ffaa33; margin: 4px 0;">
                                        <b>COORDS:</b> [${data.lat.toFixed(4)}N, ${data.lon.toFixed(4)}E]<br>
                                        <b>EST. INTENSITY:</b> ${(data.intensity * 100).toFixed(1)}%<br>
                                        <b>STATUS:</b> PENDING EDGE-AI RUN
                                    </div>
                                `;
                            } else if (item.type === 'oilleak') {
                                popupText = `
                                    <div style="line-height: 1.4;">
                                        <b style="color: #6ab0e8; font-size: 11px;">🚨 CRITICAL OIL LEAK CONFIRMED</b><br>
                                        <hr style="border: none; border-top: 1px solid #6ab0e8; margin: 4px 0;">
                                        <b>COORDS:</b> [${data.lat.toFixed(4)}N, ${data.lon.toFixed(4)}E]<br>
                                        <b>EST. INTENSITY:</b> ${(data.intensity * 100).toFixed(1)}%<br>
                                        <b>AI EDGE RUNNER:</b> EDGE_INFERENCE_VALIDATED<br>
                                        <b>GS-LINK:</b> ESTABLISHED
                                    </div>
                                `;
                            }

                            // Create popup directly on map
                            const popup = L.popup()
                                .setLatLng([data.lat, data.lon])
                                .setContent(popupText)
                                .openOn(map);
                            
                            missionMarkers[item.name] = popup;
                            
                            // Map flyTo disabled for smooth visual flow
                        }
                    } else {
                        // If file-bus indicates state is cleared, remove the popup
                        if (missionMarkers[item.name]) {
                            missionMarkers[item.name].remove();
                            delete missionMarkers[item.name];
                        }
                    }
                }
                
                // If no active hazard alert is displayed, check if C inference is running via pbs_queue.json
                if (!activeAlertFound) {
                    const r = await fetch('http://localhost:5005/signals/mission/pbs_queue.json?t=' + Date.now());
                    if (r.ok) {
                        const jobs = await r.json();
                        const job = jobs[0];
                        if (job && (job.status === 'RUNNING' || job.status === 'QUEUED')) {
                            // Show target beam to Spain/Portugal focus center
                            activeTarget = [40.2, -7.8];
                            activeColor = '#ffaa33';
                            isDashed = true;
                        }
                    }
                }
                
                // Draw or clear downlink arrow connection
                if (activeTarget && satMarker) {
                    updateDownlinkArrow(satMarker.getLatLng(), activeTarget, activeColor, isDashed);
                } else {
                    clearDownlinkArrow();
                }
            } catch(e) {
                console.error("Mission polling error:", e);
            }
        }

        setInterval(pollTelemetry, 1000);
        setInterval(pollMission, 1500);
    </script>
</body>
</html>
