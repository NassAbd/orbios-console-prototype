<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORBIOS SIMULATOR & CONTROL PANEL</title>
    <style>
        :root {
            --panel-w: 560px;
            --bg: #000;
            --border: #1d9e75;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); overflow: hidden;
            font-family: monospace;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr var(--panel-w);
            height: 100vh;
            width: 100vw;
        }
        #window-map {
            grid-column: 1;
            border-right: 1px solid var(--border);
        }
        #window-panel {
            grid-column: 2;
            background: #111;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT: Tactical Geospatial Map -->
        <div id="window-map">
            <iframe src="tactical_map.html"></iframe>
        </div>
        
        <!-- RIGHT: Control Panel -->
        <div id="window-panel">
            <iframe src="http://localhost:8765"></iframe>
        </div>
    </div>
</body>
</html>
