# ─────────────────────────────────────────────
#  Mac System Dashboard — Configuration File
#  Edit this file to control what appears.
#  Changes take effect on the next refresh.
# ─────────────────────────────────────────────

# How often to refresh the dashboard (seconds)
refresh_interval: 2

# Layout columns (legacy terminal option — unused by web UI)
columns: 2

# ── Server ─────────────────────────────────────────────
server:
  host: "127.0.0.1"
  port: 5005

# ── Theme ──────────────────────────────────────────────
# Colours used across all metric panels.
# Any valid CSS colour string works: hex, rgb(), hsl(), etc.
theme:

  # Metric state colours (applied based on warn/crit thresholds)
  colors:
    ok:   "#1d9e75"   # below warn_threshold  — green
    warn: "#ef9f27"   # between warn and crit — amber
    crit: "#e24b4a"   # above crit_threshold  — red
    info: "#6ab0e8"   # neutral / informational — blue

  # UI chrome (takes effect on next page load)
  background:         "#0d0d10"
  popover_background: "#17171d"

# ── Metric Panels ──────────────────────────────────────
# Set `enabled: true/false` to show/hide panels.
# Order controls left-to-right display sequence.

panels:

  cpu:
    enabled: true
    order: 1
    title: "CPU"
    show_per_core: true
    show_frequency: true
    show_load_average: true
    warn_threshold: 70         # % — turns amber
    crit_threshold: 90         # % — turns red

  memory:
    enabled: true
    order: 2
    title: "Memory"
    show_swap: true
    show_breakdown: true
    warn_threshold: 75
    crit_threshold: 90

  battery:
    enabled: true
    order: 3
    title: "Battery & Power"
    show_time_remaining: true
    show_cycle_count: true
    show_health: true

  disk:
    enabled: true
    order: 4
    title: "Disk"
    mounts:
      - /
    show_io: true
    warn_threshold: 80
    crit_threshold: 95

  network:
    enabled: true
    order: 5
    title: "OpenPBS Queue"
    interfaces: []
    show_packets: false
    show_errors: false

  temperature:
    enabled: true
    order: 6
    title: "Temperature"
    use_sudo: false
    warn_threshold: 75         # °C
    crit_threshold: 90         # °C

  processes:
    enabled: true
    order: 7
    title: "Top Processes"
    top_n: 8
    sort_by: cpu               # cpu | memory | name
    show_memory: true
    show_pid: true
    show_user: true

  users:
    enabled: true
    order: 8
    title: "Logged-in Users"

  uptime:
    enabled: true
    order: 9
    title: "System Info"
    show_hostname: true
    show_boot_time: true
    show_platform: true
